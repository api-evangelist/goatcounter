naftiko: 1.0.0-alpha2
info:
  label: GoatCounter API — Exports
  description: 'GoatCounter API — Exports. 3 operations. Lead operation: Create CSV export. Self-contained Naftiko capability
    covering one Goatcounter business surface.'
  tags:
  - Goatcounter
  - Exports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOATCOUNTER_API_KEY: GOATCOUNTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: goatcounter-exports
    baseUri: https://goatcounter.com/api/v0
    description: GoatCounter API — Exports business capability. Self-contained, no shared references.
    resources:
    - name: export
      path: /export
      operations:
      - name: createexport
        method: POST
        description: Create CSV export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: export-id
      path: /export/{id}
      operations:
      - name: getexport
        method: GET
        description: Get export info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
    - name: export-id-download
      path: /export/{id}/download
      operations:
      - name: downloadexport
        method: GET
        description: Download export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
    authentication:
      type: bearer
      token: '{{env.GOATCOUNTER_API_KEY}}'
  exposes:
  - type: rest
    namespace: goatcounter-exports-rest
    port: 8080
    description: REST adapter for GoatCounter API — Exports. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/export
      name: export
      description: REST surface for export.
      operations:
      - method: POST
        name: createexport
        description: Create CSV export
        call: goatcounter-exports.createexport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/export/{id}
      name: export-id
      description: REST surface for export-id.
      operations:
      - method: GET
        name: getexport
        description: Get export info
        call: goatcounter-exports.getexport
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/export/{id}/download
      name: export-id-download
      description: REST surface for export-id-download.
      operations:
      - method: GET
        name: downloadexport
        description: Download export
        call: goatcounter-exports.downloadexport
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: goatcounter-exports-mcp
    port: 9090
    transport: http
    description: MCP adapter for GoatCounter API — Exports. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-csv-export
      description: Create CSV export
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: goatcounter-exports.createexport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-export-info
      description: Get export info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: goatcounter-exports.getexport
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: download-export
      description: Download export
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: goatcounter-exports.downloadexport
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
