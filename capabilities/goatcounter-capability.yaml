    - name: statsbypage
      description: Stats for a category (browser, system, location, etc.)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: goatcounter.statsbypage
      with:
        page: tools.page
      inputParameters:
      - name: page
        type: string
        description: page
