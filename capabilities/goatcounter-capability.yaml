        mapping: $.
    - name: statstotal
      description: List total pageview counts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: goatcounter.statstotal
      outputParameters:
      - type: object
        mapping: $.
    - name: statshits
      description: View/visitor stats per path
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: goatcounter.statshits
      with:
        limit: tools.limit
        include_paths: tools.include_paths
        exclude_paths: tools.exclude_paths
        daily: tools.daily
      inputParameters:
      - name: limit
        type: integer
        description: limit
      - name: include_paths
        type: array
        description: include_paths
      - name: exclude_paths
        type: array
        description: exclude_paths
      - name: daily
        type: boolean
        description: daily
      outputParameters:
      - type: object
        mapping: $.
    - name: statshitsrefs
      description: Referral stats for a path
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: goatcounter.statshitsrefs
      with:
        path_id: tools.path_id
      inputParameters:
      - name: path_id
        type: integer
