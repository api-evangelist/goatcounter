naftiko: 1.0.0-alpha2
info:
  label: GoatCounter API — Pageviews
  description: 'GoatCounter API — Pageviews. 1 operations. Lead operation: Count pageviews. Self-contained Naftiko capability
    covering one Goatcounter business surface.'
  tags:
  - Goatcounter
  - Pageviews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOATCOUNTER_API_KEY: GOATCOUNTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: goatcounter-pageviews
    baseUri: https://goatcounter.com/api/v0
    description: GoatCounter API — Pageviews business capability. Self-contained, no shared references.
    resources:
    - name: count
      path: /count
      operations:
      - name: count
        method: POST
        description: Count pageviews
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GOATCOUNTER_API_KEY}}'
  exposes:
  - type: rest
    namespace: goatcounter-pageviews-rest
    port: 8080
    description: REST adapter for GoatCounter API — Pageviews. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/count
      name: count
      description: REST surface for count.
      operations:
      - method: POST
        name: count
        description: Count pageviews
        call: goatcounter-pageviews.count
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: goatcounter-pageviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for GoatCounter API — Pageviews. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: count-pageviews
      description: Count pageviews
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: goatcounter-pageviews.count
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
