openapi: 3.0.3
info:
  title: GoatCounter Exports Paths API
  description: The GoatCounter API can be used to manage sites, users, count pageviews, export raw data, retrieve statistics, and build custom dashboards on top of GoatCounter web analytics.
  version: '0'
  contact:
    name: GoatCounter
    url: https://www.goatcounter.com/
servers:
- url: https://goatcounter.com/api/v0
  description: Hosted GoatCounter (replace host with your site's subdomain)
security:
- bearerAuth: []
tags:
- name: Paths
paths:
  /paths:
    get:
      summary: List paths
      description: Get an overview of all tracked paths on the site.
      operationId: listPaths
      tags:
      - Paths
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
      - name: after
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: Paths overview.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
